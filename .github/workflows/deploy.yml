name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Staging: served at monishver11.github.io/site-v2. When the site moves to
  # the domain root, set both to empty/root values and remove the fix-base step.
  BASE_PATH: /site-v2
  NOTES_BASE_URL: monishver11.github.io/site-v2/notes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Astro
        working-directory: astro
        run: |
          npm ci
          npm run build

      - name: Build Quartz notes
        working-directory: quartz
        run: |
          npm ci
          npx quartz build -d ../vault -o ../astro/dist/notes

      - name: Rewrite base path (staging only)
        run: node tooling/fix-base.mjs astro/dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: astro/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
